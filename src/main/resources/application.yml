spring:
  application:
    name: cuisinvoisin-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cuisinvoisin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: user
      password: password

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.cuisinvoisin.backend: DEBUG
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
