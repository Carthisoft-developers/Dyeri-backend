# src/main/resources/application-prod.yml — production overrides
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      timeout: 3000ms

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.cuisinvoisin: INFO
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%level","traceId":"%X{traceId}","logger":"%logger{36}","message":"%msg"}%n'

management:
  endpoint:
    health:
      show-details: never
